media:
  input: public/images/uploads
  output: /images/uploads

content:
  - name: projects
    label: Projects
    type: collection
    path: content/projects
    filename: "{fields.title}.md"
    format: yaml-frontmatter
    view:
      fields: [title, type, year, order]
      primary: title
      sort: [order, year, title]
    fields:
      - name: title
        label: Title
        type: string
      - name: type
        label: Type
        type: string
      - name: description
        label: Description
        type: text
      - name: year
        label: Year
        type: number
      - name: order
        label: Order
        type: number
        description: Controls position in the grid and lists (ascending).
      - name: images
        label: Images
        type: object
        list: true
        fields:
          - name: image
            label: Image
            type: image
          - name: size
            label: Size
            type: select
            description: Image height multiplier (width stays constant).
            default: "2"
            options:
              values: ["1", "2", "3", "4", "5"]
          - name: hideInGrid
            label: Hide in grid
            type: boolean
            default: false
            description: Hide this image in the grid overview, but still show it in the detail view.
          - name: alt
            label: Alt text
            type: string
            description: Optional description for screen readers and accessibility.
