media:
  input: public/images/uploads
  output: /images/uploads
  extensions: [jpg, jpeg, png, gif, svg, mov, mp4]
  categories: [image, video]

content:
  - name: projects
    label: Projects
    type: collection
    path: content/projects
    filename: "{fields.title}.md"
    format: yaml-frontmatter
    view:
      fields: [title, type, year, order]
      primary: title
      sort: [order, year, title]
    fields:
      - name: title
        label: Title
        type: string
      - name: type
        label: Type
        type: string
      - name: description
        label: Description
        type: text
      - name: year
        label: Year
        type: number
      - name: order
        label: Order
        type: number
        description: Controls position in the grid and lists (ascending).
      - name: images
        label: Images
        type: object
        list: true
        fields:
          - name: image
            label: Image or video
            type: file
            description: Upload or pick a jpg, jpeg, png, gif, mov or mp4 file. Leave empty if you paste a video link below instead.
            options:
              categories: [image, video]
              extensions: [jpg, jpeg, png, gif, svg, mov, mp4]
          - name: videoUrl
            label: Video link
            type: string
            description: Optional. Paste a link to a video (e.g. a Dropbox share link or any direct video URL) to play it from there instead of uploading. When set, it overrides the file above.
          - name: size
            label: Size
            type: select
            description: Image height multiplier (width stays constant).
            default: "2"
            options:
              values: ["1", "2", "3", "4", "5"]
          - name: hideInGrid
            label: Hide in grid
            type: boolean
            default: false
            description: Hide this image in the grid overview, but still show it in the detail view.
          - name: alt
            label: Alt text
            type: string
            description: Optional description for screen readers and accessibility.
